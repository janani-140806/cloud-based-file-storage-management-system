<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudVault</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4F46E5;
      --secondary: #ec4899;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .splash {
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    .logo-ring {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2.5rem;
      box-shadow: 0 8px 32px rgba(79, 70, 229, 0.35);
      animation: pulse 1.5s ease-in-out infinite;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    p {
      color: #6B7280;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .dots {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .dots span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(79, 70, 229, 0.35); }
      50% { box-shadow: 0 8px 48px rgba(236, 72, 153, 0.5); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo-ring">☁️</div>
    <h1>CloudVault</h1>
    <p>Securing your files in the cloud...</p>
    <div class="dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <script>
    setTimeout(() => {
      const token = localStorage.getItem("token") || sessionStorage.getItem("token");
      window.location.href = token ? "dashboard.html" : "login.html";
    }, 1800);
  </script>
</body>
</html>
