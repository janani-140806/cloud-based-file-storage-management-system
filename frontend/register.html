<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudVault - Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card glass-panel" style="max-width: 500px;">
      <div class="text-center mb-4">
        <i class="bi bi-cloud-plus-fill" style="font-size: 3rem; color: var(--secondary);"></i>
        <h2>Create an Account</h2>
        <p class="text-muted">Start organizing your files securely.</p>
      </div>

      <div id="registerAlert" class="alert d-none" role="alert"></div>

      <form id="registerForm">
        <div class="mb-3">
          <label class="form-label text-muted fw-semibold small">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control border-start-0" id="reg-username" required placeholder="Choose a username">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label text-muted fw-semibold small">Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control border-start-0" id="reg-email" required placeholder="you@example.com">
          </div>
        </div>
        
        <div class="mb-4">
          <label class="form-label text-muted fw-semibold small">Password (Min 6 chars)</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-shield-lock"></i></span>
            <input type="password" class="form-control border-start-0" id="reg-password" required minlength="6" placeholder="••••••••">
          </div>
        </div>

        <button type="submit" class="btn btn-primary-custom" id="registerBtn">
          Register
        </button>
      </form>

      <div class="text-center mt-4 pt-3 border-top border-secondary border-opacity-25">
        <p class="text-muted small">Already have an account? <a href="login.html" class="text-decoration-none fw-bold" style="color: var(--secondary);">Log in here</a></p>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
