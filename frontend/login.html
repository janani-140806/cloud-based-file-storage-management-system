<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudVault - Login</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card glass-panel">
      <div class="text-center mb-4">
        <i class="bi bi-cloud-arrow-up-fill" style="font-size: 3rem; color: var(--primary);"></i>
        <h2>Welcome Back</h2>
        <p class="text-muted">Sign in to access your CloudVault.</p>
      </div>

      <!-- Alert logic handled by JS -->
      <div id="loginAlert" class="alert d-none" role="alert"></div>

      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label text-muted fw-semibold small">Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control border-start-0" id="email" required placeholder="you@example.com">
          </div>
        </div>
        
        <div class="mb-4">
          <label class="form-label text-muted fw-semibold small">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control border-start-0" id="password" required placeholder="••••••••">
          </div>
        </div>
        
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label text-muted small" for="rememberMe">Remember me</label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary-custom" id="loginBtn">
          Sign In
        </button>
      </form>

      <div class="text-center mt-4 pt-3 border-top border-secondary border-opacity-25">
        <p class="text-muted small">Don't have an account? <a href="register.html" class="text-decoration-none fw-bold" style="color: var(--primary);">Create here</a></p>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
